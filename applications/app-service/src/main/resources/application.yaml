server:
  port: 8082
spring:
  application:
    name: "BTG_Pactual_Backend_Challenge_Yerid"
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: local
aws:
  region: "us-east-1"
  dynamodb:
    endpoint: "http://localhost:4567"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  # Habilita el soporte para Spring Framework 7
  show-actuator: true

cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"
